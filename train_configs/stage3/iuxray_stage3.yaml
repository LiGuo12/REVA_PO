model:
  arch: APRPO_stage3
  model_type: APRPO
  max_txt_len: 100

  # lora configuartion
  use_lora: True
  lora_rank: 32
  lora_alpha: 32
  lora_dropout: 0.1
  # all linear layers
  lora_target_modules: ["qkv", "proj", "gate_proj", "up_proj", "down_proj", "q_proj","v_proj","k_proj","o_proj"]

  # ZeRO optimizer configuration
  use_zero_optimizer: True
  
  # RL configuration
  use_rl: True
  group_size: 4
  update_ref_every: 3
  update_old_every: 16
  ent_coef: 1e-3
  b_min: 0.05
  b_base: 0.10
  b_max: 0.15

  # sampling hyperparameters
  temperature: 0.7
  top_k: 0
  top_p: 0.9
  min_new_tokens: 40
  repetition_penalty: 1.05

  train_cls: False
  cls_thresholds: [0.2871, 0.0805, 0.1960, 0.2936, 0.2195, 0.0403,
                  0.1234, 0.0136, 0.1756, 0.0408, 0.5776, 0.1970,
                  0.1508, 0.2561]
  
  # pre-trained model
  pretrained_cls_ckp: "/path/to/iuxray/iuxray_cls_ckpt.pth"
  pretrained_stage2: "/path/to/iuxray/iuxray_stage2_ckpt.pth"
  pretrained_stage3: "/path/to/iuxray/iuxray_stage3_ckpt.pth"

  evaluate: True
  # evaluate: False

  dataset_name: "iuxray"

datasets:
  iuxray:
    build_info:
        storage: "/path/to/iu_xray"
        ann_file: "/path/to/iu_xray/annotation_with_categories.json"

run:
  task: xray_report_generation
  log_freq: 50
  max_epoch: 15
  batch_size_train: 1 # train batch size per gpu
  batch_size_eval: 1 # eval batch size per gpu
  num_workers: 2 # of workers for data loading
  accum_grad_iters: 1

  seed: 42
  output_dir: "output/APRPO_stage3_IUXRay"

  amp: False
  resume_ckpt_path: null

  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 8 # num of gpus
  dist_url: "env://"
  distributed: True
  # ZeRO optimizer configuration
  use_zero_optimizer: True
  deepspeed_config: "train_configs/stage3/zero_iuxray_stage3.json"

