model:
  arch: Medical_MAE
  model_type: Medical_MAE

  # ZeRO optimizer configuration
  use_zero_optimizer: True

  use_rl: False
  train_cls: True

  vit_ckpt: "/path/to/Medical_MAE/vit-b_CXR_0.5M_mae_CheXpert.pth"

  evaluate: False

  dataset_name: "mimic"

datasets:
  mimic:
    build_info:
        storage: "/path/to/mimic-cxr-jpg/2.1.0"
        ann_file: "/path/to/mimic/mimic_with_categories.json"

run:
  task: chestxray_multilabel_cls
  # optimizer
  init_lr_cls: 1.5e-3 
  beta2: 0.95
  weight_decay_cls: 0.05 
  log_freq: 20
  max_epoch: 20 
  batch_size_train: 200 
  batch_size_eval: 200
  num_workers: 6 
  accum_grad_iters: 1

  seed: 42
  output_dir: "output/APRPO_stage2_MIMIC_cls"

  amp: False
  resume_ckpt_path: null

  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 8 
  dist_url: "env://"
  distributed: True
  # ZeRO optimizer configuration
  use_zero_optimizer: True
  deepspeed_config: "train_configs/stage2_cls/zero_mimic_stage2_cls.json"


